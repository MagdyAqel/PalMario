<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>رحلة الزيتون</title>
<style>
*{box-sizing:border-box}html,body{height:100%}body{margin:0;font-family:Tahoma,Arial,sans-serif;background:#f7f0e5;color:#111;display:grid;place-items:center;overscroll-behavior:none;touch-action:none}main{width:min(100%,1100px);border:3px solid #111;background:#fff9ef;position:relative;overflow:hidden}.hud{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:10px;border-bottom:3px solid #111}.brand{display:flex;align-items:center;gap:10px}.flag{width:42px;height:28px;border:2px solid #111;background:linear-gradient(#000 0 33.333%,#fff 33.333% 66.666%,#009736 66.666%);position:relative;overflow:hidden}.flag:before{content:"";position:absolute;inset:0 auto 0 0;width:36%;background:#ee2a35;clip-path:polygon(0 0,100% 50%,0 100%)}h1{margin:0;font-size:clamp(1.25rem,4vw,2.3rem)}.stats{display:flex;gap:7px;direction:ltr;font-weight:800}.stats span,.city span,button{border:2px solid #111;border-radius:7px;background:#fff;padding:7px 12px;box-shadow:0 3px 0 #111}.city{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;padding:7px;border-bottom:3px solid #111}.city span{text-align:center;font-weight:800;white-space:nowrap}.city .on{background:#c7252d;color:#fff}.city .done{background:#0a7a47;color:#fff}.wrap{position:relative}canvas{display:block;width:100%;aspect-ratio:16/9;background:#bfe3e1}.overlay,.quiz{position:absolute;inset:0;display:grid;place-items:center;text-align:center;background:rgba(255,249,239,.78);z-index:3}.hidden{display:none}.overlay strong{font-size:clamp(2rem,8vw,5.2rem);display:block}.credit{font-size:clamp(1rem,3.5vw,1.45rem);font-weight:800}.quiz .box{background:#fff9ef;border:3px solid #111;border-radius:8px;padding:20px;width:min(92%,620px)}.answers{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.fact{position:absolute;right:12px;top:12px;z-index:2;background:#fff;border:2px solid #111;border-radius:7px;padding:10px;font-weight:800;display:none;max-width:520px}.fact.show{display:block;animation:pop .22s ease-out}@keyframes pop{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}.touch{direction:ltr;position:absolute;left:12px;right:12px;bottom:12px;z-index:4;display:none;grid-template-columns:56px 56px 1fr 66px;gap:8px;pointer-events:none}.touch button{height:52px;font-size:1.8rem;pointer-events:auto;touch-action:none;user-select:none;opacity:.9}.touch button:last-child{grid-column:4;width:66px}@media(pointer:coarse),(max-width:780px){body{display:block}main{min-height:100vh;border-left:0;border-right:0}.hud{flex-wrap:wrap;padding:8px}.flag{width:34px;height:23px}.stats span{padding:6px 9px}.city{grid-template-columns:repeat(3,1fr);padding:6px}.city span{font-size:.8rem;padding:5px}.touch{display:grid}.fact{left:8px;right:8px;top:8px;bottom:auto;font-size:.86rem;max-width:none}.answers{grid-template-columns:1fr}.quiz .box{padding:14px}}
</style>
</head>
<body>
<main>
<header class="hud"><div class="brand"><span class="flag"></span><h1>رحلة الزيتون</h1></div><div class="stats"><span id="score">0</span><span id="olives">0</span><span id="lives">3</span></div><button id="restart">↻</button></header>
<div id="city" class="city"></div>
<div class="wrap"><canvas id="game" width="960" height="540"></canvas><div id="fact" class="fact"></div><div class="touch" aria-hidden="true"><button data-key="ArrowLeft">‹</button><button data-key="ArrowRight">›</button><button data-key="Space">⌃</button></div><div id="startScreen" class="overlay"><div><strong>رحلة الزيتون</strong><p class="credit">تصميم أ.د. مجدي عقل</p><button id="start">ابدأ</button></div></div><div id="quiz" class="quiz hidden"><div class="box"><p>بوابة المدن الفلسطينية</p><h2 id="question"></h2><div id="answers" class="answers"></div><p id="feedback"></p></div></div></div>
</main>
<script>
const canvas=document.getElementById('game'),ctx=canvas.getContext('2d'),W=960,H=540,keys=new Set();
const scoreEl=document.getElementById('score'),olivesEl=document.getElementById('olives'),livesEl=document.getElementById('lives'),cityEl=document.getElementById('city'),factEl=document.getElementById('fact'),quiz=document.getElementById('quiz'),question=document.getElementById('question'),answers=document.getElementById('answers'),feedback=document.getElementById('feedback'),startScreen=document.getElementById('startScreen');
const cities=[['القدس','أي مدينة فلسطينية تضم المسجد الأقصى؟',['القدس','نابلس','غزة'],'القدس','القدس مدينة تاريخية عريقة وفيها المسجد الأقصى وقبة الصخرة.',585],['نابلس','أي مدينة فلسطينية تشتهر بالكنافة؟',['نابلس','الخليل','يافا'],'نابلس','نابلس معروفة بالكنافة والصابون البلدي وأسواقها القديمة.',1215],['الخليل','أي مدينة فلسطينية تشتهر بالعنب والزجاج؟',['الخليل','أريحا','جنين'],'الخليل','الخليل تشتهر بالعنب وصناعة الزجاج والخزف.',1915],['أريحا','أي مدينة فلسطينية تعد من أقدم مدن العالم؟',['أريحا','بيت لحم','طولكرم'],'أريحا','أريحا من أقدم المدن المأهولة في العالم وتشتهر بالنخيل.',2325],['بيت لحم','أي مدينة فلسطينية ترتبط بكنيسة المهد؟',['بيت لحم','صفد','قلقيلية'],'بيت لحم','بيت لحم مدينة تاريخية ترتبط بكنيسة المهد.',2865]];
const level={width:3180,platforms:[[0,468,620,72],[710,468,560,72],[1380,468,640,72],[2120,468,1060,72],[390,358,160,28,1],[830,350,190,28,1],[1160,282,170,28],[1560,360,210,28,1],[1885,306,180,28],[2360,358,220,28,1],[2685,306,180,28]],olives:[[250,410],[430,314],[515,314],[810,414],[900,306],[980,306],[1210,238],[1285,238],[1535,414],[1640,316],[1730,316],[1930,262],[2010,262],[2230,414],[2420,314],[2520,314],[2720,262],[2800,262],[3000,414]],haz:[[676,432,34,36],[1336,432,38,36],[2068,432,40,36],[2630,432,38,36]],finish:[3070,300,34,168]};
let p,cam=0,run=false,state,audio,raf=0;
function newState(){return{score:0,olives:0,lives:3,done:cities.map(()=>false),cur:0}}
function reset(){cancelAnimationFrame(raf);p={x:72,y:320,w:38,h:56,vx:0,vy:0,ground:false,face:1,inv:0};state=newState();level.olives=level.olives.map(o=>[o[0],o[1],false]);cam=0;run=true;startScreen.classList.add('hidden');quiz.classList.add('hidden');hud();drawCities();loop()}
function hud(){scoreEl.textContent=state.score;olivesEl.textContent=state.olives;livesEl.textContent=state.lives}
function drawCities(){cityEl.innerHTML='';cities.forEach((c,i)=>{let s=document.createElement('span');s.textContent=c[0];if(state.done[i])s.className='done';else if(i===state.cur)s.className='on';cityEl.appendChild(s)})}
function tone(f){try{audio=audio||new (window.AudioContext||window.webkitAudioContext)();if(audio.state==='suspended')audio.resume();let o=audio.createOscillator(),g=audio.createGain();o.frequency.value=f;g.gain.value=.045;o.connect(g);g.connect(audio.destination);o.start();g.gain.exponentialRampToValueAtTime(.001,audio.currentTime+.12);o.stop(audio.currentTime+.12)}catch(e){}}
function fact(t){factEl.textContent=t;factEl.classList.add('show');clearTimeout(fact.t);fact.t=setTimeout(()=>factEl.classList.remove('show'),3000)}
function rect(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y}
function ask(i,finish=false){run=false;state.cur=i;drawCities();question.textContent=cities[i][1];feedback.textContent='';answers.innerHTML='';cities[i][2].forEach(o=>{let b=document.createElement('button');b.textContent=o;b.onclick=()=>answer(i,o,finish);answers.appendChild(b)});quiz.classList.remove('hidden')}
function answer(i,o,finish){[...answers.children].forEach(b=>b.disabled=true);if(o===cities[i][3]){state.score+=finish?500:180;state.done[i]=true;state.cur=Math.min(4,i+1);hud();drawCities();fact(cities[i][4]);tone(880);quiz.classList.add('hidden');if(finish){run=false;startScreen.querySelector('strong').textContent='وصلت الراية';startScreen.classList.remove('hidden')}else{p.x+=50;p.vx=2;run=true;loop()}}else{state.lives--;hud();tone(160);if(state.lives<=0){quiz.classList.add('hidden');startScreen.querySelector('strong').textContent='انتهت المرحلة';startScreen.classList.remove('hidden')}else{feedback.textContent='حاول مرة أخرى. الإجابة الصحيحة: '+cities[i][3];setTimeout(()=>{quiz.classList.add('hidden');p.x=Math.max(72,cities[i][5]-95);p.y=250;p.vx=-2;p.vy=0;p.inv=75;run=true;loop()},1200)}}}
function update(){if(keys.has('ArrowLeft')||keys.has('KeyA')){p.vx-=p.ground?.72:.56;p.face=-1}if(keys.has('ArrowRight')||keys.has('KeyD')){p.vx+=p.ground?.72:.56;p.face=1}if((keys.has('Space')||keys.has('ArrowUp'))&&p.ground){p.vy=-15.8;p.ground=false;tone(330)}p.vx*=p.ground?.82:.93;p.vx=Math.max(-7.1,Math.min(7.1,p.vx));p.vy+=.78;p.x+=p.vx;p.y+=p.vy;p.ground=false;level.platforms.forEach(a=>{let r={x:a[0],y:a[1],w:a[2],h:a[3]};if(rect(p,r)&&p.y+p.h-p.vy<=r.y+2&&p.vy>=0){p.y=r.y-p.h;p.vy=0;p.ground=true}});if(p.y>H+100)hurt();level.haz.forEach(a=>{if(rect(p,{x:a[0],y:a[1],w:a[2],h:a[3]}))hurt()});level.olives.forEach(o=>{if(!o[2]&&Math.hypot(o[0]-(p.x+p.w/2),o[1]-(p.y+p.h/2))<34){o[2]=true;state.olives++;state.score+=100;hud();fact(cities[(state.olives-1)%5][4]);tone(660)}});cities.forEach((c,i)=>{if(!state.done[i]&&rect(p,{x:c[5],y:360,w:36,h:108}))ask(i)});if(rect(p,{x:level.finish[0],y:level.finish[1],w:34,h:168}))ask(4,true);cam=Math.max(0,Math.min(level.width-W,p.x-300));if(p.inv>0)p.inv--}
function hurt(){if(p.inv>0)return;state.lives--;p.inv=90;hud();p.x=Math.max(72,cam+70);p.y=170;p.vx=p.vy=0;if(state.lives<=0){run=false;startScreen.querySelector('strong').textContent='انتهت المرحلة';startScreen.classList.remove('hidden')}}
function flag(x,y,w,h){ctx.fillStyle='#000';ctx.fillRect(x,y,w,h/3);ctx.fillStyle='#fff';ctx.fillRect(x,y+h/3,w,h/3);ctx.fillStyle='#009736';ctx.fillRect(x,y+2*h/3,w,h/3);ctx.fillStyle='#ee2a35';ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x+w*.34,y+h/2);ctx.lineTo(x,y+h);ctx.fill()}
function draw(){ctx.clearRect(0,0,W,H);let g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,'#a6d8de');g.addColorStop(1,'#fff8e9');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);ctx.save();ctx.translate(-cam,0);ctx.fillStyle='#7ea366';ctx.beginPath();ctx.moveTo(-100,450);ctx.quadraticCurveTo(500,260,1100,450);ctx.fill();ctx.fillStyle='#6b9065';ctx.beginPath();ctx.moveTo(1200,455);ctx.quadraticCurveTo(2000,250,3180,455);ctx.fill();level.platforms.forEach(a=>{ctx.fillStyle=a[4]?'#f8f1e4':'#6f665f';ctx.fillRect(a[0],a[1],a[2],a[3]);if(a[4])flag(a[0],a[1]+8,a[2],20);ctx.strokeRect(a[0],a[1],a[2],a[3])});level.olives.forEach(o=>{if(!o[2]){ctx.fillStyle='#31451f';ctx.beginPath();ctx.ellipse(o[0],o[1],10,13,-.35,0,7);ctx.fill()}});cities.forEach((c,i)=>{ctx.fillStyle=state.done[i]?'rgba(10,122,71,.28)':'rgba(199,37,45,.22)';ctx.fillRect(c[5],360,36,108);ctx.strokeRect(c[5],360,36,108);flag(c[5]+20,310,72,42);ctx.save();ctx.translate(c[5]+18,414);ctx.rotate(-Math.PI/2);ctx.fillStyle='#111';ctx.font='bold 18px Tahoma';ctx.fillText(c[0],0,0);ctx.restore()});level.haz.forEach(h=>{ctx.fillStyle='#c7252d';ctx.beginPath();ctx.moveTo(h[0],h[1]+h[3]);ctx.lineTo(h[0]+h[2]/2,h[1]);ctx.lineTo(h[0]+h[2],h[1]+h[3]);ctx.fill()});flag(level.finish[0]+7,312,82,54);ctx.fillStyle='#111';ctx.fillRect(level.finish[0],300,7,168);player();ctx.restore()}
function player(){if(p.inv&&Math.floor(p.inv/6)%2===0)return;ctx.save();ctx.translate(p.x+p.w/2,p.y+p.h/2);ctx.scale(p.face,1);ctx.translate(-p.w/2,-p.h/2);ctx.fillStyle='#202020';ctx.fillRect(8,48,9,8);ctx.fillRect(23,48,9,8);ctx.fillStyle='#0a7a47';ctx.fillRect(8,29,23,21);ctx.fillStyle='#ee2a35';ctx.beginPath();ctx.moveTo(8,29);ctx.lineTo(18,39);ctx.lineTo(8,50);ctx.fill();ctx.fillStyle='#fffdf7';ctx.fillRect(5,4,29,14);ctx.fillRect(3,12,8,25);ctx.fillRect(29,12,7,22);ctx.fillStyle='#111';for(let i=0;i<4;i++){ctx.fillRect(7+i*7,6,4,4);ctx.fillRect(10+i*7,12,4,4)}ctx.fillStyle='#d89562';ctx.beginPath();ctx.roundRect(8,13,23,22,8);ctx.fill();ctx.fillStyle='#111';ctx.fillRect(13,21,4,5);ctx.fillRect(24,21,4,5);ctx.fillStyle='#e9a072';ctx.fillRect(10,27,5,3);ctx.fillRect(26,27,5,3);ctx.fillStyle='#7a2f2f';ctx.fillRect(17,30,8,2);ctx.restore()}
function loop(){cancelAnimationFrame(raf);if(!run){draw();return}update();draw();raf=requestAnimationFrame(loop)}
addEventListener('keydown',e=>{if(['ArrowLeft','ArrowRight','ArrowUp','Space'].includes(e.code))e.preventDefault();keys.add(e.code)});addEventListener('keyup',e=>keys.delete(e.code));document.querySelectorAll('[data-key]').forEach(b=>{const k=b.dataset.key;['pointerdown','touchstart'].forEach(ev=>b.addEventListener(ev,e=>{e.preventDefault();keys.add(k);tone(k==='Space'?330:220)}));['pointerup','pointerleave','pointercancel','touchend','touchcancel'].forEach(ev=>b.addEventListener(ev,e=>{e.preventDefault();keys.delete(k)}))});document.getElementById('start').onclick=reset;document.getElementById('restart').onclick=reset;p={x:72,y:320,w:38,h:56,vx:0,vy:0,ground:false,face:1,inv:0};state=newState();hud();drawCities();draw();
</script>
</body>
</html>
